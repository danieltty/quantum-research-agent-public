name: Validate Public Evidence Repo

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
      - name: Validate public artifacts
        run: python scripts/validate_public_repo.py
